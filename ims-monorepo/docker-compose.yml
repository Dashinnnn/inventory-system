services:
  redis:
    image: redis:alpine
    container_name: ims_redis
    restart: always
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: Centaim
      MONGO_INITDB_ROOT_PASSWORD: centaim120903
      MONGO_INITDB_DATABASE: ims_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ADMINUSERNAME=Centaim
      - ME_CONFIG_MONGODB_ADMINPASSWORD=centaim120903
      - ME_CONFIG_BASICAUTH_USERNAME=Centaim
      - ME_CONFIG_BASICAUTH_PASSWORD=centaim120903
      - ME_CONFIG_MONGODB_URL=mongodb://Centaim:centaim120903@mongodb:27017/admin?authSource=admin
    depends_on:
      - mongodb

  backend:
    build: 
      context: .
      dockerfile: ./apps/ims_api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    environment:
      # Key fix: renamed MONGO_URI to MONGODB_URI to match your db.ts logic
      - MONGODB_URI=mongodb://Centaim:centaim120903@mongodb:27017/ims_db?authSource=admin
      # Key fix: using the service name 'redis' instead of localhost
      - REDIS_URL=redis://redis:6379

  frontend:
    build:
      context: .
      dockerfile: ./apps/ims_web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: