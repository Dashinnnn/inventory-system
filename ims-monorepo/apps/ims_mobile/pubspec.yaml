name: ims_mobile
description: "A new Flutter project."

publish_to: 'none' # Remove this if you ever want to publish

version: 1.0.0+1

environment:
  sdk: ^3.10.8  # Or update to a higher version if your Flutter supports it (e.g. ^3.5.0)

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # flutter_native_splash as dependency (recommended; works for create command)
  flutter_native_splash: ^2.4.7  # latest stable as of now

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets declaration (this is correct under flutter:)
  assets:
    - assets/images/  # covers logo.png etc.

# flutter_native_splash config — MOVED TO TOP-LEVEL (NOT under flutter:)
flutter_native_splash:
  color: "#ffffff"                  # White background (change as needed)
  image: assets/images/logo.png     # Your logo file (must exist!)
  android: true
  ios: true
  android_12:
    image: assets/images/logo.png   # For Android 12+ icon styling

# Optional: dark mode example (uncomment if needed)
#  color_dark: "#121212"
#  image_dark: assets/images/logo_dark.png